server:
  port: 8080

spring:
  application:
    name: eventos-cloud
  # Default profile uses H2 in-memory so the app runs with zero external deps.
  datasource:
    url: jdbc:h2:mem:eventos;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

# Security / JWT settings
app:
  jwt:
    # Base64-ish secret; override in production via APP_JWT_SECRET env var.
    secret: ${APP_JWT_SECRET:b3JxdWVzdGEtZXZlbnRvcy1jbG91ZC1zZWNyZXQta2V5LWNoYW5nZS1tZS1wbGVhc2U=}
    expiration-minutes: 720
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173}
  # Demo user seeded on startup
  demo-user:
    email: ana.torres@orquesta.io
    password: orquesta
    name: Ana Torres
    role: analista

logging:
  level:
    org.springframework.security: WARN

---
# Activate with: -Dspring-boot.run.profiles=postgres  (or SPRING_PROFILES_ACTIVE=postgres)
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/eventos}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:eventos}
    password: ${POSTGRES_PASSWORD:eventos}
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false
